<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Chat</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<div class="app-background"></div>
<div class="header">
    <div class="logo">
        <img src="icon.png" alt="Prism Logo">
        <h1>Prism</h1>
    </div>
    <div class="header-actions">
        <button id="newChatBtn" class="new-chat-btn" title="New Chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
        <div class="custom-select">
            <select id="modelSelect">
                <option value="">Loading models...</option>
            </select>
        </div>
        <button id="closeBtn" class="close-btn" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
</div>

<div id="chatContainer" class="chat-container">
    <!-- Messages will be injected here -->
    <div class="system-message">Select a model and ask a question about this page.</div>
</div>

<div class="input-area">
    <textarea id="promptInput" placeholder="Ask about this page..." rows="1"></textarea>
    <!-- Regenerate Button -->
    <button id="regenerateBtn" class="action-btn" title="Regenerate Last Response" style="display: none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
        </svg>
    </button>
    <!-- Send Button -->
    <button id="sendBtn" class="action-btn send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12L2.01 3L2 10l15 2-15 2z" fill="currentColor" />
        </svg>
    </button>
</div>

<script src="vendor/purify.min.js"></script>
<script src="vendor/marked.min.js"></script>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<script src="vendor/katex/katex.min.js"></script>
<script src="vendor/katex/auto-render.min.js"></script>
<script src="popup.js"></script>
</body>

</html>
